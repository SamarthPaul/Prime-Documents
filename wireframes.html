<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PRIME Rural Fellowship - Wireframes</title>
<link rel="stylesheet" href="styles.css">
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  /* Utility: the view tabs toggle this class to show exactly one panel at a time.
     Without it the QA matrix renders stacked below the wireframe iframe. */
  .hidden { display: none !important; }

  /* Sub-header */
  .wf-head {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .wf-head h1 { font-size: 16px; font-weight: 700; margin: 0; color: var(--prime-green); white-space: nowrap; }
  .wf-head .sub { font-size: 12px; color: var(--text-secondary); }
  .wf-search {
    margin-left: auto; min-width: 200px; flex: 0 1 280px;
    padding: 7px 12px; font-size: 13px; font-family: var(--font);
    border: 1px solid var(--border); border-radius: 8px; outline: none;
  }
  .wf-search:focus { border-color: var(--prime-green); }

  /* Layout */
  .wf-layout { flex: 1; display: flex; min-height: 0; }

  /* Sidebar */
  .wf-side {
    width: 280px; flex-shrink: 0; background: var(--card);
    border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0 24px;
  }
  .wf-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
    color: var(--text-secondary); padding: 14px 18px 6px; }
  .wf-item {
    display: block; padding: 8px 18px; font-size: 13px; color: var(--text);
    text-decoration: none; border-left: 3px solid transparent; cursor: pointer;
    transition: background .12s;
  }
  .wf-item:hover { background: var(--prime-green-light); }
  .wf-item.active { background: var(--prime-green-light); border-left-color: var(--prime-green);
    color: var(--prime-green); font-weight: 600; }
  .wf-item.hidden { display: none; }
  .wf-cat.hidden { display: none; }
  .wf-empty { padding: 18px; font-size: 13px; color: var(--text-secondary); display: none; }

  /* Viewer */
  .wf-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #fff; }
  .wf-toolbar {
    display: flex; align-items: center; gap: 12px; padding: 8px 16px;
    border-bottom: 1px solid var(--border); background: #fafbfc;
  }
  .wf-toolbar .name { font-size: 13px; font-weight: 600; }
  .wf-toolbar .path { font-size: 11px; color: var(--text-secondary); }
  .wf-toolbar .spacer { margin-left: auto; }
  .wf-btn {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
    padding: 6px 12px; border-radius: 7px; text-decoration: none; cursor: pointer;
    border: 1px solid var(--border); background: #fff; color: var(--text);
  }
  .wf-btn:hover { border-color: var(--prime-green); color: var(--prime-green); }
  .wf-btn-primary { background: var(--prime-green); color: #fff; border-color: var(--prime-green); }
  .wf-btn-primary:hover { background: var(--prime-green-dark); color: #fff; }
  .wf-frame-wrap { flex: 1; min-height: 0; position: relative; }
  iframe#wfFrame { border: 0; width: 100%; height: 100%; display: block; background: #fff; }

  /* View tabs (Wireframe | QA) */
  .wf-viewtabs { display: flex; gap: 4px; margin-left: 18px; }
  .wf-vtab {
    font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer;
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 7px;
    background: #fff; color: var(--text-secondary);
  }
  .wf-vtab.active { background: var(--prime-green); color: #fff; border-color: var(--prime-green); }
  .wf-vtab-badge {
    display: none; margin-left: 5px; padding: 1px 7px; border-radius: 9px;
    font-size: 10px; font-weight: 700; background: var(--red); color: #fff;
  }
  .wf-vtab-badge.show { display: inline-block; }
  .wf-vtab-badge.pending { background: var(--amber); }

  /* QA matrix */
  .wf-qa-wrap { flex: 1; min-height: 0; overflow: auto; background: var(--bg); padding: 16px; }
  .qa-head { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
  .qa-head h2 { font-size: 15px; margin: 0 0 4px; color: var(--prime-green); }
  .qa-head .qa-meta { font-size: 12px; color: var(--text-secondary); }
  .qa-note { font-size: 12px; color: var(--text); background: #fff8e1; border: 1px solid #f0e0a8; border-radius: 8px; padding: 10px 12px; margin-top: 10px; }
  .qa-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; font-size: 11px; color: var(--text-secondary); }
  .qa-counts { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .qa-pill { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 16px; }
  .qa-pill.gap { background: #fde2e2; color: #b42318; }
  .qa-pill.pend { background: #fef3d0; color: #9a6700; }
  .qa-pill.ok { background: var(--prime-green-light); color: var(--prime-green); }
  .qa-pill.total { background: #eef1f5; color: var(--text-secondary); }

  .qa-table-wrap { overflow-x: auto; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
  table.qa-table { border-collapse: collapse; width: 100%; min-width: 1100px; font-size: 12px; }
  table.qa-table th { background: var(--prime-green); color: #fff; text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 600; position: sticky; top: 0; white-space: nowrap; }
  table.qa-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.qa-table tr:hover td { background: #fafbfc; }
  .qa-secrow td { background: #eef1f5 !important; font-weight: 700; color: var(--text); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
  .qa-el { font-weight: 600; color: var(--text); }
  .qa-ty { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .3px; }
  .qa-rule { color: var(--text-secondary); font-size: 11px; max-width: 320px; }
  .qa-cell { text-align: center; font-weight: 700; white-space: nowrap; }
  .qa-Y { color: var(--prime-green); }
  .qa-N { color: var(--red); }
  .qa-q { color: var(--amber); }
  .qa-dash { color: var(--border); }
  .qa-verdict { font-weight: 700; font-size: 11px; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .qa-verdict.gap { background: #fde2e2; color: #b42318; }
  .qa-verdict.pend { background: #fef3d0; color: #9a6700; }
  .qa-verdict.ok { background: var(--prime-green-light); color: var(--prime-green); }
  .qa-sev { font-size: 10px; font-weight: 700; text-transform: uppercase; }
  .qa-sev.blocker { color: #b42318; }
  .qa-sev.serious { color: #c2410c; }
  .qa-sev.minor { color: var(--text-secondary); }
  .qa-empty { padding: 40px; text-align: center; color: var(--text-secondary); font-size: 14px; }

  /* Mobile sidebar toggle */
  .wf-sidetoggle { display: none; }
  @media (max-width: 760px) {
    .wf-side { position: fixed; top: var(--site-nav-h); left: 0; bottom: 0; z-index: 50;
      transform: translateX(-100%); transition: transform .2s; box-shadow: 2px 0 12px rgba(0,0,0,.12); }
    .wf-side.open { transform: translateX(0); }
    .wf-sidetoggle { display: inline-flex; }
  }
</style>
</head>
<body>
<script src="nav.js"></script>
<script src="qa-data.js"></script>

<div class="wf-head">
  <button class="wf-btn wf-sidetoggle" id="sideToggle">&#9776; Modules</button>
  <h1>Wireframes</h1>
  <span class="sub">All 28 framework mockups, grouped by module as on the portal &mdash; click any framework to view it inline, then compare against the build.</span>
  <input type="search" class="wf-search" id="wfSearch" placeholder="Search modules&hellip;" autocomplete="off">
</div>

<div class="wf-layout">
  <aside class="wf-side" id="wfSide"></aside>
  <main class="wf-main">
    <div class="wf-toolbar">
      <div>
        <div class="name" id="wfName">&mdash;</div>
        <div class="path" id="wfPath"></div>
      </div>
      <div class="wf-viewtabs">
        <button class="wf-vtab active" id="vtabWf" data-view="wf">Wireframe</button>
        <button class="wf-vtab" id="vtabQa" data-view="qa">QA vs Portal <span class="wf-vtab-badge" id="qaBadge"></span></button>
      </div>
      <div class="spacer"></div>
      <a class="wf-btn wf-btn-primary" id="wfOpen" href="#" target="_blank" rel="noopener">&#8599; Open in new tab</a>
    </div>
    <div class="wf-frame-wrap" id="wfView">
      <iframe id="wfFrame" title="Wireframe preview"></iframe>
    </div>
    <div class="wf-qa-wrap hidden" id="qaView"></div>
  </main>
</div>

<script>
(function () {
  // Module -> Framework structure mirrors the portal & BRD "Module & Framework Map".
  // Order and names match the BRD tree exactly. The 13th module (Entrepreneur
  // Progress Report) is a standalone report with no framework mockup, so it is omitted.
  var WIREFRAMES = [
    { cat: 'Product', items: [
      { f: 'product_profile_module.html',         l: 'Product Profile' }
    ]},
    { cat: 'Accounts', items: [
      { f: 'financials_module.html',              l: 'Financials' }
    ]},
    { cat: 'Manufacturing', items: [
      { f: 'raw_material_module.html',            l: 'Raw Materials' },
      { f: 'machinery_module.html',               l: 'Machinery' },
      { f: 'human_resource_module.html',          l: 'Human Resource' }
    ]},
    { cat: 'Infrastructure', items: [
      { f: 'infrastructure_module.html',          l: 'Infrastructure' }
    ]},
    { cat: 'Marketing Tools', items: [
      { f: 'branding_identity_module.html',       l: 'Branding Identity' },
      { f: 'labels_module.html',                  l: 'Labels' },
      { f: 'brochures_module.html',               l: 'Brochure' }
    ]},
    { cat: 'Pricing', items: [
      { f: 'unit_pricing_module.html',            l: 'Unit Pricing' }
    ]},
    { cat: 'Market', items: [
      { f: 'market_research_module.html',         l: 'Market Research' },
      { f: 'customer_analysis_module.html',       l: 'Customer Analysis' },
      { f: 'market_linkage_module.html',          l: 'Market Linkage' },
      { f: 'promotions_module.html',              l: 'Promotions' }
    ]},
    { cat: 'Product Development', items: [
      { f: 'product_prototyping_module.html',     l: 'Product Prototyping' },
      { f: 'product_testing_module.html',         l: 'Product Testing' },
      { f: 'product_standardization_module.html', l: 'Product Standardization' },
      { f: 'quality_control_module.html',         l: 'Quality Control' },
      { f: 'product_packaging_module.html',       l: 'Product Packaging' }
    ]},
    { cat: 'Skilling', items: [
      { f: 'digital_literacy_module.html',        l: 'Digital Literacy' },
      { f: 'capacity_building_module.html',       l: 'Capacity Building' },
      { f: 'business_plan_canvas_module.html',    l: 'Business Plan Canvas' }
    ]},
    { cat: 'Logistics', items: [
      { f: 'logistics_packing_module.html',       l: 'Logistic Packing' },
      { f: 'logistics_service_module.html',       l: 'Logistic Service' }
    ]},
    { cat: 'Funding', items: [
      { f: 'pitch_deck_module.html',              l: 'Pitch Deck' },
      { f: 'schemes_funding_module.html',         l: 'Schemes & Funding' }
    ]},
    { cat: 'Legal Compliance', items: [
      { f: 'product_compliance_module.html',      l: 'Product Compliance' },
      { f: 'business_registration_module.html',   l: 'Business Registration' }
    ]}
  ];
  var BASE = 'wireframes/';

  var side = document.getElementById('wfSide');
  var frame = document.getElementById('wfFrame');
  var nameEl = document.getElementById('wfName');
  var pathEl = document.getElementById('wfPath');
  var openEl = document.getElementById('wfOpen');
  var search = document.getElementById('wfSearch');
  var byFile = {};
  var firstFile = WIREFRAMES[0].items[0].f;

  // Build sidebar
  WIREFRAMES.forEach(function (group) {
    var h = document.createElement('div');
    h.className = 'wf-cat';
    h.textContent = group.cat;
    h.dataset.cat = group.cat;
    side.appendChild(h);
    group.items.forEach(function (it) {
      var a = document.createElement('a');
      a.className = 'wf-item';
      a.textContent = it.l;
      a.href = '#' + it.f.replace(/\.html$/, '');
      a.dataset.file = it.f;
      a.dataset.label = it.l.toLowerCase();
      a.dataset.cat = group.cat;
      side.appendChild(a);
      byFile[it.f] = { el: a, label: it.l };
    });
  });
  var empty = document.createElement('div');
  empty.className = 'wf-empty';
  empty.id = 'wfEmpty';
  empty.textContent = 'No modules match your search.';
  side.appendChild(empty);

  var qaView = document.getElementById('qaView');
  var wfView = document.getElementById('wfView');
  var vtabWf = document.getElementById('vtabWf');
  var vtabQa = document.getElementById('vtabQa');
  var qaBadge = document.getElementById('qaBadge');
  var QA = window.QA_DATA || {};

  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // present/value/functional cell glyphs
  function cell(val) {
    if (val === 'Y') return '<td class="qa-cell qa-Y">✓</td>';
    if (val === 'N') return '<td class="qa-cell qa-N">✗</td>';
    if (val === '-') return '<td class="qa-cell qa-dash">—</td>';
    return '<td class="qa-cell qa-q">?</td>';
  }
  function rowVerdict(r) {
    if (r.p === 'N' || r.v === 'N' || r.fn === 'N') return 'gap';
    if (r.p === '?' || r.v === '?' || r.fn === '?') return 'pend';
    return 'ok';
  }

  function renderQA(file) {
    var d = QA[file];
    if (!d) {
      qaBadge.className = 'wf-vtab-badge';
      qaView.innerHTML = '<div class="qa-empty">No QA comparison has been run for this framework yet.<br>The wireframe-vs-portal audit is being rolled out framework by framework.</div>';
      return;
    }
    var gaps = 0, pend = 0, ok = 0;
    d.rows.forEach(function (r) { var v = rowVerdict(r); if (v === 'gap') gaps++; else if (v === 'pend') pend++; else ok++; });

    // badge on the tab: gaps (red) take priority, else pending (amber)
    if (gaps > 0) { qaBadge.textContent = gaps; qaBadge.className = 'wf-vtab-badge show'; }
    else if (pend > 0) { qaBadge.textContent = pend; qaBadge.className = 'wf-vtab-badge show pending'; }
    else { qaBadge.textContent = ok; qaBadge.className = 'wf-vtab-badge show'; qaBadge.style.background = 'var(--prime-green)'; }

    var html = '<div class="qa-head">'
      + '<h2>' + esc(d.framework) + ' &mdash; Wireframe vs Portal</h2>'
      + '<div class="qa-meta">Module: <strong>' + esc(d.module) + '</strong> &middot; Portal: ' + esc(d.portalPath)
      + (d.checkedOn ? ' &middot; Verified on staging: ' + esc(d.checkedOn) : ' &middot; <em>staging verification pending</em>') + '</div>'
      + '<div class="qa-counts">'
      + '<span class="qa-pill total">' + d.rows.length + ' checkpoints</span>'
      + '<span class="qa-pill gap">' + gaps + ' gap' + (gaps === 1 ? '' : 's') + '</span>'
      + '<span class="qa-pill pend">' + pend + ' to verify</span>'
      + '<span class="qa-pill ok">' + ok + ' OK</span>'
      + '</div>'
      + (d.note ? '<div class="qa-note">' + esc(d.note) + '</div>' : '')
      + '<div class="qa-legend"><span>Columns: <strong>P</strong> = present &middot; <strong>V</strong> = shows values/options &middot; <strong>F</strong> = clickable/functional</span>'
      + '<span>✓ yes &middot; ✗ no (gap) &middot; ? to verify &middot; — n/a</span></div>'
      + '</div>';

    html += '<div class="qa-table-wrap"><table class="qa-table"><thead><tr>'
      + '<th>Element</th><th>Where / trigger</th><th>P</th><th>V</th><th>F</th>'
      + '<th>Front-end rule (HTML + BRD)</th><th>Back-end rule (BRD)</th><th>Verdict</th><th>Notes</th>'
      + '</tr></thead><tbody>';

    var lastKey = null;
    d.rows.forEach(function (r) {
      var key = r.t + ' › ' + r.s;
      if (key !== lastKey) {
        html += '<tr class="qa-secrow"><td colspan="9">' + esc(key) + '</td></tr>';
        lastKey = key;
      }
      var v = rowVerdict(r);
      var vlabel = v === 'gap' ? 'GAP' : v === 'pend' ? 'TO VERIFY' : 'OK';
      html += '<tr>'
        + '<td><div class="qa-el">' + esc(r.e) + '</div><div class="qa-ty">' + esc(r.ty || '') + (r.sev ? ' &middot; <span class="qa-sev ' + r.sev + '">' + r.sev + '</span>' : '') + '</div></td>'
        + '<td class="qa-rule">' + esc(r.w || '') + '</td>'
        + cell(r.p) + cell(r.v) + cell(r.fn)
        + '<td class="qa-rule">' + esc(r.fe || '') + '</td>'
        + '<td class="qa-rule">' + esc(r.be || '') + '</td>'
        + '<td><span class="qa-verdict ' + v + '">' + vlabel + '</span></td>'
        + '<td class="qa-rule">' + esc(r.n || '') + '</td>'
        + '</tr>';
    });
    html += '</tbody></table></div>';
    qaView.innerHTML = html;
  }

  function setView(view) {
    var qa = view === 'qa';
    qaView.classList.toggle('hidden', !qa);
    wfView.classList.toggle('hidden', qa);
    vtabQa.classList.toggle('active', qa);
    vtabWf.classList.toggle('active', !qa);
  }
  vtabWf.addEventListener('click', function () { setView('wf'); });
  vtabQa.addEventListener('click', function () { setView('qa'); });

  function show(file) {
    var rec = byFile[file];
    if (!rec) { file = firstFile; rec = byFile[file]; }
    frame.src = BASE + file;
    nameEl.textContent = rec.label;
    pathEl.textContent = 'from-client/' + file;
    openEl.href = BASE + file;
    Object.keys(byFile).forEach(function (f) { byFile[f].el.classList.remove('active'); });
    rec.el.classList.add('active');
    document.getElementById('wfSide').classList.remove('open');
    renderQA(file);
    setView('wf');
  }

  // Sidebar clicks update the hash; hashchange drives the view
  side.addEventListener('click', function (e) {
    var a = e.target.closest('.wf-item');
    if (!a) return;
    e.preventDefault();
    location.hash = a.dataset.file.replace(/\.html$/, '');
    show(a.dataset.file);
  });

  function fromHash() {
    var h = (location.hash || '').replace(/^#/, '');
    var file = h ? h + '.html' : firstFile;
    show(byFile[file] ? file : firstFile);
  }
  window.addEventListener('hashchange', fromHash);

  // Search filter
  search.addEventListener('input', function () {
    var q = search.value.trim().toLowerCase();
    var anyVisible = false;
    var visibleByCat = {};
    side.querySelectorAll('.wf-item').forEach(function (a) {
      var match = !q || a.dataset.label.indexOf(q) !== -1;
      a.classList.toggle('hidden', !match);
      if (match) { anyVisible = true; visibleByCat[a.dataset.cat] = true; }
    });
    side.querySelectorAll('.wf-cat').forEach(function (h) {
      h.classList.toggle('hidden', !visibleByCat[h.dataset.cat]);
    });
    document.getElementById('wfEmpty').style.display = anyVisible ? 'none' : 'block';
  });

  document.getElementById('sideToggle').addEventListener('click', function () {
    document.getElementById('wfSide').classList.toggle('open');
  });

  fromHash();
})();
</script>
</body>
</html>
