name: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test subset (e.g. "tests/04-entry") — leave blank for full run'
        required: false
        default: ''
      project:
        description: 'Project (sm / cti / ctp / fa / selco / designer / anon / firefox / webkit)'
        required: false
        default: ''
  schedule:
    # 07:30 IST Mon–Fri (02:00 UTC). Catches nightly drift before the team logs in.
    - cron: '0 2 * * 1-5'

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Playwright on staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: tests/playwright
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('tests/playwright/package-lock.json') }}

      - name: Install Playwright browsers (Chromium + Firefox + WebKit)
        # Firefox + WebKit power the §5 cross-browser smoke (chromium-smoke/firefox/webkit projects).
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run tests
        env:
          BASE_URL: https://stgprime-rural.dhwaniris.in
          UAT_SM_PASSWORD:       ${{ secrets.UAT_SM_PASSWORD }}
          UAT_CTI_PASSWORD:      ${{ secrets.UAT_CTI_PASSWORD }}
          UAT_CTP_PASSWORD:      ${{ secrets.UAT_CTP_PASSWORD }}
          UAT_FA_PASSWORD:       ${{ secrets.UAT_FA_PASSWORD }}
          UAT_SELCO_PASSWORD:    ${{ secrets.UAT_SELCO_PASSWORD }}
          UAT_DESIGNER_PASSWORD: ${{ secrets.UAT_DESIGNER_PASSWORD }}
          ADMIN_API_KEY:         ${{ secrets.ADMIN_API_KEY }}
          ADMIN_API_SECRET:      ${{ secrets.ADMIN_API_SECRET }}
        run: |
          ARGS=""
          [ -n "${{ inputs.suite }}" ]   && ARGS="$ARGS ${{ inputs.suite }}"
          [ -n "${{ inputs.project }}" ] && ARGS="$ARGS --project=${{ inputs.project }}"
          npx playwright test $ARGS

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/playwright-report
          retention-days: 14

      - name: Upload traces (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/playwright/test-results
          retention-days: 14
