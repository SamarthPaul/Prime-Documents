name: Lighthouse Performance (§10)

# Performance baselines per test-cases §10 (PR-TC-XC-PERF). Runs Lighthouse (desktop
# preset, throttled) against the login page (public, hard budget) and the authenticated
# dashboard/list/form pages (warn-level — tune to error once baselines settle).
#
# Chrome is pre-installed on GitHub-hosted ubuntu runners, so no browser install step.

on:
  workflow_dispatch:
  schedule:
    # 08:00 IST Mon (02:30 UTC) — weekly perf baseline.
    - cron: '30 2 * * 1'

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse desktop baselines
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: tests/playwright
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lighthouse — public (login) [hard budget]
        env:
          BASE_URL: https://stgprime-rural.dhwaniris.in
        run: npx --yes @lhci/cli@0.14.x autorun --config=lighthouse/lighthouserc.public.json

      - name: Lighthouse — authenticated (dashboard / list / form) [warn]
        if: always()
        env:
          BASE_URL: https://stgprime-rural.dhwaniris.in
          UAT_SM_PASSWORD: ${{ secrets.UAT_SM_PASSWORD }}
        run: npx --yes @lhci/cli@0.14.x autorun --config=lighthouse/lighthouserc.auth.json

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            tests/playwright/lighthouse/.report-public
            tests/playwright/lighthouse/.report-auth
          retention-days: 14
